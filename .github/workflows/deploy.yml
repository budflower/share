name: Deploy UniApp H5 to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build UniApp H5
        run: npm run build:h5

      - name: Prepare docs folder
        run: |
          rm -rf docs
          mkdir docs
          cp -r dist/build/h5/* docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

      # ✅ 清 Cloudflare 缓存
      - name: Purge Cloudflare Cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      # ✅ 等待 Pages / CDN 生效
      - name: Wait for site ready
        run: sleep 60

      # ✅ Lighthouse CI（测线上地址）
      # ✅ Lighthouse CI（测线上地址）
      - name: Run Lighthouse CI
        run: |
          echo "🚀 开始安装灯塔..."
          npm install -g @lhci/cli@0.12.x
          
          echo "🔍 开始审计线上地址..."
          # 因为 lighthouserc.cjs 里已经配置了 url，这里直接 autorun 即可
          lhci autorun --max-warnings 0

      # ✅ 飞书通知（成功）
      - name: Notify Feishu (Success)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "config": { "wide_screen_mode": true },
                "header": {
                  "title": { "tag": "plain_text", "content": "✅ 部署成功" },
                  "template": "green"
                },
                "elements": [
                  { "tag": "div", "text": { "tag": "lark_md", "content": "🌐 [访问站点](${{ secrets.SITE_URL }})" } },
                  { "tag": "div", "text": { "tag": "lark_md", "content": "📦 Commit：`${{ github.sha }}`" } },
                  { "tag": "hr" },
                  { "tag": "note", "elements": [{ "tag": "plain_text", "content": "GitHub Actions 自动通知" }] }
                ]
              }
            }'

      # ✅ 飞书通知（失败）
      - name: Notify Feishu (Failure)
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "config": { "wide_screen_mode": true },
                "header": {
                  "title": { "tag": "plain_text", "content": "❌ 部署失败" },
                  "template": "red"
                },
                "elements": [
                  { "tag": "div", "text": { "tag": "lark_md", "content": "🔗 **查看日志**\n[点击跳转 Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" } }
                ]
              }
            }'